version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mahjong-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mahjong
      POSTGRES_PASSWORD: mahjong_dev
      POSTGRES_DB: mahjong
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mahjong"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mahjong-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
